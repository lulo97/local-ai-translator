<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Dịch Thuật</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 350px;
      min-height: 200px;
      font-family: 'Google Sans', 'Segoe UI', Roboto, Arial, sans-serif;
      font-size: 14px;
      background: #f8f9fa;
      color: #3c4043;
    }

    /* ── Header ── */
    .popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      background: #fff;
      border-bottom: 1px solid #dadce0;
    }

    .popup-header svg { color: #1a73e8; flex-shrink: 0; }

    .popup-header-title {
      font-weight: 600;
      font-size: 15px;
      color: #1a73e8;
    }

    .popup-header-sub {
      font-size: 11px;
      color: #70757a;
      margin-left: auto;
    }

    /* ── Settings bar ── */
    .popup-settings {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #fff;
      border-bottom: 1px solid #f1f3f4;
    }

    .popup-settings label {
      font-size: 12px;
      color: #70757a;
    }

    .popup-settings input[type="number"] {
      width: 68px;
      padding: 3px 6px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font-size: 12px;
      color: #3c4043;
      font-family: inherit;
    }

    .popup-settings input[type="number"]:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.18);
    }

    .popup-save-btn {
      margin-left: auto;
      padding: 3px 10px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }

    .popup-save-btn:hover { background: #1558b0; }

    /* ── Input area ── */
    .popup-input-wrap {
      padding: 12px 14px 0;
    }

    .popup-textarea {
      width: 100%;
      height: 90px;
      resize: none;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      font-family: inherit;
      color: #3c4043;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      line-height: 1.5;
    }

    .popup-textarea:focus {
      outline: none;
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.18);
    }

    .popup-textarea::placeholder { color: #bdc1c6; }

    /* ── Translate button ── */
    .popup-actions {
      padding: 8px 14px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .popup-translate-btn {
      flex: 1;
      padding: 8px 16px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .popup-translate-btn:hover {
      background: #1558b0;
      box-shadow: 0 2px 6px rgba(26,115,232,0.35);
    }

    .popup-translate-btn:disabled {
      background: #bdc1c6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .popup-clear-btn {
      padding: 8px 12px;
      background: none;
      border: 1px solid #dadce0;
      border-radius: 20px;
      font-size: 13px;
      color: #70757a;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s;
    }

    .popup-clear-btn:hover { background: #f1f3f4; }

    /* ── Divider ── */
    .popup-divider {
      border: none;
      border-top: 1px solid #e8eaed;
      margin: 0 14px;
    }

    /* ── Result ── */
    .popup-result-wrap {
      padding: 12px 14px;
      display: none;
    }

    .popup-result-wrap.visible { display: block; }

    .popup-result-label {
      font-size: 11px;
      font-weight: 600;
      color: #1a73e8;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .popup-result-mode {
      font-size: 11px;
      background: #e8f0fe;
      color: #1967d2;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
    }

    .popup-result-body {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.6;
      color: #3c4043;
      max-height: 220px;
      overflow-y: auto;
    }

    .popup-result-body::-webkit-scrollbar { width: 5px; }
    .popup-result-body::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }

    .popup-result-body .section-header {
      font-weight: 600;
      font-size: 13px;
      color: #1a73e8;
      margin: 10px 0 4px;
      padding-bottom: 4px;
      border-bottom: 1px solid #e8f0fe;
    }

    .popup-result-body .section-header:first-child { margin-top: 0; }

    /* ── Loading ── */
    .popup-loading {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      color: #70757a;
      font-size: 13px;
    }

    .popup-loading.visible { display: flex; }

    .popup-spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid #e8eaed;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    .popup-error {
      display: none;
      padding: 10px 14px;
      font-size: 13px;
      color: #d93025;
      background: #fce8e6;
      border-radius: 0 0 8px 8px;
    }

    .popup-error.visible { display: block; }

    /* ── Footer actions ── */
    .popup-result-footer {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .popup-footer-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      background: none;
      border: 1px solid #dadce0;
      border-radius: 14px;
      cursor: pointer;
      color: #1a73e8;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      font-family: inherit;
      transition: background 0.15s;
    }

    .popup-footer-btn:hover { background: #e8f0fe; border-color: #1a73e8; }
    .popup-footer-btn.success { color: #137333; border-color: #34a853; background: #e6f4ea; }

    /* ── Bottom status bar ── */
    .popup-status-bar {
      padding: 6px 14px 8px;
      font-size: 11px;
      color: #bdc1c6;
      text-align: right;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="popup-header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
    </svg>
    <span class="popup-header-title">AI Dịch Thuật</span>
    <span class="popup-header-sub" id="popup-lang-label">→ Tiếng Việt</span>
  </div>

  <!-- Settings bar -->
  <div class="popup-settings">
    <label for="popup-port">Port:</label>
    <input type="number" id="popup-port" min="1" max="65535" value="8080" placeholder="8080" />
    <label for="popup-threshold" style="margin-left:6px">Ngưỡng dài:</label>
    <input type="number" id="popup-threshold" min="5" max="500" value="30" placeholder="30" />
    <button class="popup-save-btn" id="popup-save-btn">Lưu</button>
  </div>

  <!-- Input -->
  <div class="popup-input-wrap">
    <textarea
      class="popup-textarea"
      id="popup-input"
      placeholder="Nhập hoặc dán văn bản vào đây…"
      autofocus
    ></textarea>
  </div>

  <!-- Actions -->
  <div class="popup-actions">
    <button class="popup-translate-btn" id="popup-translate-btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04z"/>
      </svg>
      Dịch / Giải thích
    </button>
    <button class="popup-clear-btn" id="popup-clear-btn">Xoá</button>
  </div>

  <hr class="popup-divider" />

  <!-- Loading -->
  <div class="popup-loading" id="popup-loading">
    <div class="popup-spinner"></div>
    <span>Đang xử lý…</span>
  </div>

  <!-- Error -->
  <div class="popup-error" id="popup-error"></div>

  <!-- Result -->
  <div class="popup-result-wrap" id="popup-result-wrap">
    <div class="popup-result-label">
      Kết quả
      <span class="popup-result-mode" id="popup-result-mode"></span>
    </div>
    <div class="popup-result-body" id="popup-result-body"></div>
    <div class="popup-result-footer">
      <button class="popup-footer-btn" id="popup-copy-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
        Sao chép
      </button>
    </div>
  </div>

  <!-- Status bar -->
  <div class="popup-status-bar" id="popup-status-bar">llama.cpp · local</div>

  <script src="popup.js"></script>
</body>
</html>
